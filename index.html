<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oelbert Studiehulp</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e3a8a;
      --card: rgba(255, 255, 255, 0.1);
      --card-border: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.78);
      --button-bg: #ffffff;
      --button-text: #17306b;
      --button-hover: #e8eefc;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero {
      text-align: center;
      padding: 24px 12px 10px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 12px auto 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .sections {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 18px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }

    .button-list {
      display: grid;
      gap: 12px;
    }

    .button {
      display: block;
      width: 100%;
      padding: 16px 18px;
      text-decoration: none;
      color: var(--button-text);
      background: var(--button-bg);
      border-radius: 16px;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 10px 24px rgba(11, 24, 58, 0.16);
    }

    .button:hover,
    .button:focus {
      background: var(--button-hover);
      transform: translateY(-2px);
      outline: none;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 24px;
    }

    @media (min-width: 720px) {
      .page {
        padding: 36px 24px 56px;
      }

      .sections {
        grid-template-columns: repeat(3, 1fr);
        align-items: start;
      }

      .section {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Oelbert Studiehulp</h1>
      <p>Games, infographics en podcasts op één plek.</p>
    </section>

    <section class="sections">
      <div class="section">
        <h2>Games</h2>
        <div class="button-list">
          <a class="button" href="https://latijn-duel.vercel.app/" target="_blank" rel="noopener noreferrer">
            Latijn Duel
          </a>
        </div>
      </div>

      <div class="section">
        <h2>Infographics</h2>
        <div class="button-list">
          <a class="button" href="inhoudaanzicht.png" target="_blank" rel="noopener noreferrer">
            Wiskunde inhoud 9.4 en aanzichten 9.5
          </a>
          <a class="button" href="3Kronos.png" target="_blank" rel="noopener noreferrer">
            Kronos
          </a>
          <a class="button" href="4Zeus.png" target="_blank" rel="noopener noreferrer">
            Zeus
          </a>
        </div>
      </div>

      <div class="section">
        <h2>Podcasts</h2>
        <div class="button-list">
          <a class="button" href="https://notebooklm.google.com/notebook/c23c12bb-ddf3-4cf4-9214-60404ca574fe?artifactId=bee21f46-c7a0-4627-8809-aa54934f94fe" target="_blank" rel="noopener noreferrer">
            Podcast Kronos
          </a>
          <a class="button" href="https://notebooklm.google.com/notebook/72242292-62bb-4b3f-b30c-e1b16c24b96d?artifactId=e4891ab4-b0f0-4f18-98e7-ec8a2af43bf7" target="_blank" rel="noopener noreferrer">
            Podcast Zeus
          </a>
        </div>
      </div>
    </section>

    <section class="sections" style="margin-top:18px;">
      <div class="section" style="grid-column: 1 / -1;">
        <h2>Video</h2>
        <div class="button-list">
          <a class="button" href="https://notebooklm.google.com/notebook/a1ed4461-cc65-4933-8829-7d8624bd51af?artifactId=4ec8c264-021e-4d7e-8198-f0bf82322ba8" target="_blank" rel="noopener noreferrer">
            Wiskunde inhoud en aanzichten – supersnelle uitleg (hfst 9.4 / 9.5)
          </a>
        </div>
      </div>
    </section>

    <div class="footer">
      Open in een nieuw tabblad
    </div>
  </main>
</body>
</html>
